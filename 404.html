      background-color: var(--color-text);
      border-radius: 8px;
      text-decoration: none;
      transition: opacity 150ms ease, transform 150ms var(--ease-out);
    }
    .back:hover { color: var(--color-bg); opacity: 0.88; transform: translateY(-1px); }
